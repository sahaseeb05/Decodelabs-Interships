<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Recommendation Engine</title>
  
  <!-- Fonts & FontAwesome Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    /* Theme Variables */
    :root[data-theme="dark"] {
      --bg-overlay: linear-gradient(135deg, rgba(15, 23, 42, 0.9) 0%, rgba(30, 27, 75, 0.9) 100%);
      --card-bg: rgba(30, 41, 59, 0.8);
      --card-border: rgba(255, 255, 255, 0.12);
      --text-main: #f8fafc;
      --text-sub: #94a3b8;
      --input-bg: rgba(15, 23, 42, 0.85);
      --input-border: #334155;
      --input-icon: #818cf8;
      --result-card-bg: rgba(15, 23, 42, 0.7);
      --modal-bg: #1e293b;
      --progress-bg: rgba(255, 255, 255, 0.1);
    }

    :root[data-theme="light"] {
      --bg-overlay: linear-gradient(135deg, rgba(241, 245, 249, 0.9) 0%, rgba(226, 232, 240, 0.9) 100%);
      --card-bg: rgba(255, 255, 255, 0.9);
      --card-border: rgba(0, 0, 0, 0.08);
      --text-main: #0f172a;
      --text-sub: #64748b;
      --input-bg: rgba(255, 255, 255, 0.95);
      --input-border: #cbd5e1;
      --input-icon: #6366f1;
      --result-card-bg: #f8fafc;
      --modal-bg: #ffffff;
      --progress-bg: rgba(0, 0, 0, 0.08);
    }

    * {
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
      transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease, transform 0.2s ease;
    }

    body {
      background: var(--bg-overlay), 
                  url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1920&auto=format&fit=crop') no-repeat center center fixed;
      background-size: cover;
      min-height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      color: var(--text-main);
    }

    .container {
      background: var(--card-bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 35px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.4);
      position: relative;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .badge {
      background: linear-gradient(90deg, #6366f1, #a855f7);
      color: #fff;
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    }

    .theme-toggle-btn {
      background: transparent;
      border: 1px solid var(--card-border);
      color: var(--text-main);
      padding: 8px 14px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }

    .theme-toggle-btn:hover {
      background: rgba(99, 102, 241, 0.15);
      border-color: #6366f1;
    }

    .header {
      text-align: center;
      margin-bottom: 25px;
    }

    h2 {
      font-size: 26px;
      font-weight: 700;
      margin: 8px 0 6px 0;
      color: var(--text-main);
    }

    p {
      color: var(--text-sub);
      font-size: 14px;
      margin: 0;
    }

    .input-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-sub);
      margin-bottom: 6px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--input-icon);
      font-size: 15px;
      z-index: 10;
    }

    select {
      width: 100%;
      padding: 13px 16px 13px 42px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 12px;
      color: var(--text-main);
      font-size: 14px;
      outline: none;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      background-image: url('data:image/svg+xml;utf8,<svg fill="%23818cf8" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/></svg>');
      background-repeat: no-repeat;
      background-position: right 14px center;
    }

    select option {
      background: var(--modal-bg);
      color: var(--text-main);
    }

    select:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.25);
    }

    .button-group {
      display: flex;
      gap: 12px;
      margin-top: 22px;
    }

    .btn-submit {
      flex: 2;
      background: linear-gradient(90deg, #6366f1, #8b5cf6);
      color: white;
      border: none;
      padding: 14px;
      font-size: 15px;
      font-weight: 600;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(99, 102, 241, 0.35);
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }

    .btn-reset {
      flex: 1;
      background: rgba(239, 68, 68, 0.15);
      color: #ef4444;
      border: 1px solid rgba(239, 68, 68, 0.3);
      padding: 14px;
      font-size: 15px;
      font-weight: 600;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(99, 102, 241, 0.5);
    }

    .btn-reset:hover {
      transform: translateY(-2px);
      background: rgba(239, 68, 68, 0.25);
    }

    /* Skeleton Loader */
    .skeleton-card {
      background: var(--result-card-bg);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 16px;
      margin-top: 10px;
      height: 65px;
      position: relative;
      overflow: hidden;
    }

    .skeleton-card::after {
      content: '';
      position: absolute;
      top: 0; right: 0; bottom: 0; left: 0;
      transform: translateX(-100%);
      background-image: linear-gradient(
        90deg,
        rgba(255, 255, 255, 0) 0,
        rgba(255, 255, 255, 0.08) 20%,
        rgba(255, 255, 255, 0.18) 60%,
        rgba(255, 255, 255, 0)
      );
      animation: shimmer 1.2s infinite;
    }

    @keyframes shimmer {
      100% { transform: translateX(100%); }
    }

    /* Results UI & Progress Bars */
    .results {
      margin-top: 25px;
    }

    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .results-title {
      font-size: 12px;
      color: var(--text-sub);
      letter-spacing: 1px;
      font-weight: 700;
      text-transform: uppercase;
      margin: 0;
    }

    .btn-copy {
      background: transparent;
      border: 1px solid var(--card-border);
      color: var(--text-sub);
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .btn-copy:hover {
      color: #818cf8;
      border-color: #818cf8;
    }

    .result-card {
      background: var(--result-card-bg);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 16px;
      margin-top: 12px;
      opacity: 0;
      animation: slideIn 0.4s ease-out forwards;
    }

    .result-card:hover {
      transform: translateY(-3px);
      border-color: rgba(99, 102, 241, 0.4);
    }

    .result-card:nth-child(1) { animation-delay: 0.1s; }
    .result-card:nth-child(2) { animation-delay: 0.25s; }
    .result-card:nth-child(3) { animation-delay: 0.4s; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .item-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .item-title i { color: #818cf8; }

    .match-score {
      background: rgba(16, 185, 129, 0.15);
      color: #34d399;
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      border: 1px solid rgba(52, 211, 153, 0.25);
    }

    /* Progress Bar */
    .progress-bar {
      height: 6px;
      background: var(--progress-bg);
      border-radius: 10px;
      overflow: hidden;
      width: 100%;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #10b981, #6366f1);
      border-radius: 10px;
      width: 0%;
      transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Alert Modal Overlay */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(8px);
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      z-index: 999;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-box {
      background: var(--modal-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 28px;
      width: 90%;
      max-width: 380px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      transform: scale(0.9);
      transition: transform 0.3s ease;
    }

    .modal-overlay.active .modal-box {
      transform: scale(1);
    }

    .modal-icon {
      font-size: 40px;
      color: #ef4444;
      margin-bottom: 12px;
    }

    .modal-title {
      font-size: 19px;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text-main);
    }

    .modal-msg {
      font-size: 14px;
      color: var(--text-sub);
      margin-bottom: 22px;
      line-height: 1.5;
    }

    .modal-btn {
      background: #ef4444;
      color: white;
      border: none;
      padding: 12px 28px;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="top-bar">
      <span class="badge"><i class="fa-solid fa-robot"></i> AI Engine v2.0</span>
      <button class="theme-toggle-btn" onclick="toggleTheme()" id="themeBtn">
        <i class="fa-solid fa-sun"></i> Light Mode
      </button>
    </div>

    <div class="header">
      <h2>Smart Recommendations</h2>
      <p>Select 3 unique tech domains to generate matches</p>
    </div>

    <!-- Dropdown 1 -->
    <div class="input-group">
      <label>Primary Interest</label>
      <div class="input-wrapper">
        <i class="fa-solid fa-code"></i>
        <select id="p1">
          <option value="">-- Choose Preference 1 --</option>
          <option value="python">Python Programming</option>
          <option value="machine-learning">Machine Learning</option>
          <option value="neural-networks">Neural Networks</option>
          <option value="deep-learning">Deep Learning</option>
          <option value="computer-vision">Computer Vision</option>
          <option value="nlp">Natural Language Processing (NLP)</option>
          <option value="data-science">Data Science & Analytics</option>
          <option value="html">HTML & UI Design</option>
          <option value="javascript">JavaScript / Frontend</option>
          <option value="react">React Framework</option>
          <option value="flask">Flask / Web Backend</option>
          <option value="cloud-computing">Cloud Computing (AWS/GCP)</option>
          <option value="sql">SQL & Databases</option>
          <option value="mlops">MLOps & Model Deployment</option>
          <option value="data-vis">Data Visualization</option>
          <option value="algorithms">Algorithms & Data Structures</option>
          <option value="pytorch">PyTorch Framework</option>
          <option value="tensorflow">TensorFlow Framework</option>
          <option value="scikit-learn">Scikit-Learn</option>
          <option value="automation">Automation & Scripting</option>
        </select>
      </div>
    </div>

    <!-- Dropdown 2 -->
    <div class="input-group">
      <label>Secondary Interest</label>
      <div class="input-wrapper">
        <i class="fa-solid fa-brain"></i>
        <select id="p2">
          <option value="">-- Choose Preference 2 --</option>
          <option value="python">Python Programming</option>
          <option value="machine-learning">Machine Learning</option>
          <option value="neural-networks">Neural Networks</option>
          <option value="deep-learning">Deep Learning</option>
          <option value="computer-vision">Computer Vision</option>
          <option value="nlp">Natural Language Processing (NLP)</option>
          <option value="data-science">Data Science & Analytics</option>
          <option value="html">HTML & UI Design</option>
          <option value="javascript">JavaScript / Frontend</option>
          <option value="react">React Framework</option>
          <option value="flask">Flask / Web Backend</option>
          <option value="cloud-computing">Cloud Computing (AWS/GCP)</option>
          <option value="sql">SQL & Databases</option>
          <option value="mlops">MLOps & Model Deployment</option>
          <option value="data-vis">Data Visualization</option>
          <option value="algorithms">Algorithms & Data Structures</option>
          <option value="pytorch">PyTorch Framework</option>
          <option value="tensorflow">TensorFlow Framework</option>
          <option value="scikit-learn">Scikit-Learn</option>
          <option value="automation">Automation & Scripting</option>
        </select>
      </div>
    </div>

    <!-- Dropdown 3 -->
    <div class="input-group">
      <label>Tertiary Interest</label>
      <div class="input-wrapper">
        <i class="fa-solid fa-network-wired"></i>
        <select id="p3">
          <option value="">-- Choose Preference 3 --</option>
          <option value="python">Python Programming</option>
          <option value="machine-learning">Machine Learning</option>
          <option value="neural-networks">Neural Networks</option>
          <option value="deep-learning">Deep Learning</option>
          <option value="computer-vision">Computer Vision</option>
          <option value="nlp">Natural Language Processing (NLP)</option>
          <option value="data-science">Data Science & Analytics</option>
          <option value="html">HTML & UI Design</option>
          <option value="javascript">JavaScript / Frontend</option>
          <option value="react">React Framework</option>
          <option value="flask">Flask / Web Backend</option>
          <option value="cloud-computing">Cloud Computing (AWS/GCP)</option>
          <option value="sql">SQL & Databases</option>
          <option value="mlops">MLOps & Model Deployment</option>
          <option value="data-vis">Data Visualization</option>
          <option value="algorithms">Algorithms & Data Structures</option>
          <option value="pytorch">PyTorch Framework</option>
          <option value="tensorflow">TensorFlow Framework</option>
          <option value="scikit-learn">Scikit-Learn</option>
          <option value="automation">Automation & Scripting</option>
        </select>
      </div>
    </div>

    <div class="button-group">
      <button class="btn-submit" onclick="getRecs()">
        <i class="fa-solid fa-wand-magic-sparkles"></i> Generate Matches
      </button>
      <button class="btn-reset" onclick="resetForm()">
        <i class="fa-solid fa-rotate-left"></i> Reset
      </button>
    </div>

    <div class="results" id="results"></div>
  </div>

  <!-- Custom Alert Modal -->
  <div class="modal-overlay" id="customModal">
    <div class="modal-box">
      <i class="fa-solid fa-circle-exclamation modal-icon"></i>
      <div class="modal-title" id="modalTitle">Attention Needed</div>
      <div class="modal-msg" id="modalMessage">Please fill in all preferences!</div>
      <button class="modal-btn" onclick="closeModal()">Got it</button>
    </div>
  </div>

  <script>
    let currentRecommendations = [];

    // Theme Toggle Function
    function toggleTheme() {
      const html = document.documentElement;
      const themeBtn = document.getElementById('themeBtn');
      if (html.getAttribute('data-theme') === 'dark') {
        html.setAttribute('data-theme', 'light');
        themeBtn.innerHTML = '<i class="fa-solid fa-moon"></i> Dark Mode';
      } else {
        html.setAttribute('data-theme', 'dark');
        themeBtn.innerHTML = '<i class="fa-solid fa-sun"></i> Light Mode';
      }
    }

    // Modal Helpers
    function showAlert(title, message) {
      document.getElementById('modalTitle').innerText = title;
      document.getElementById('modalMessage').innerText = message;
      document.getElementById('customModal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('customModal').classList.remove('active');
    }

    // Reset Form
    function resetForm() {
      document.getElementById('p1').value = '';
      document.getElementById('p2').value = '';
      document.getElementById('p3').value = '';
      document.getElementById('results').innerHTML = '';
      currentRecommendations = [];
    }

    // Copy Results
    function copyResults() {
      if (currentRecommendations.length === 0) return;
      const text = currentRecommendations.map(r => `${r.title}: ${r.score}% Match`).join('\n');
      navigator.clipboard.writeText(`AI Recommendation Results:\n${text}`);
      
      const copyBtn = document.getElementById('copyBtn');
      copyBtn.innerHTML = '<i class="fa-solid fa-check" style="color:#10b981;"></i> Copied!';
      setTimeout(() => {
        copyBtn.innerHTML = '<i class="fa-regular fa-copy"></i> Copy';
      }, 2000);
    }

    // Main Recommendation Fetch Function
    async function getRecs() {
      const p1 = document.getElementById('p1').value;
      const p2 = document.getElementById('p2').value;
      const p3 = document.getElementById('p3').value;

      // Check empty values
      if (!p1 || !p2 || !p3) {
        showAlert("Incomplete Selection", "Please select options for all 3 preferences before generating recommendations.");
        return;
      }

      // Check duplicate selections
      if (p1 === p2 || p2 === p3 || p1 === p3) {
        showAlert("Duplicate Options Found", "Please choose 3 different preferences. Duplicate selections are not allowed!");
        return;
      }

      const div = document.getElementById('results');
      
      // Show Skeleton Loaders
      div.innerHTML = `
        <div class="results-header">
          <h3 class="results-title"><i class="fa-solid fa-spinner fa-spin"></i> Calculating Cosine Vectors...</h3>
        </div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
      `;

      try {
        const response = await fetch('/recommend', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ preferences: [p1, p2, p3] })
        });

        const data = await response.json();

        if (data.recommendations) {
          currentRecommendations = data.recommendations;
          div.innerHTML = `
            <div class="results-header">
              <h3 class="results-title"><i class="fa-solid fa-list-check"></i> TOP MATCHES</h3>
              <button class="btn-copy" id="copyBtn" onclick="copyResults()">
                <i class="fa-regular fa-copy"></i> Copy
              </button>
            </div>
          `;

          data.recommendations.forEach(rec => {
            div.innerHTML += `
              <div class="result-card">
                <div class="card-top">
                  <span class="item-title">
                    <i class="fa-solid fa-layer-group"></i>
                    ${rec.title}
                  </span>
                  <span class="match-score"><i class="fa-solid fa-bolt"></i> ${rec.score}%</span>
                </div>
                <div class="progress-bar">
                  <div class="progress-fill" style="width: 0%" data-score="${rec.score}"></div>
                </div>
              </div>
            `;
          });

          // Animate progress bars smoothly after DOM render
          setTimeout(() => {
            document.querySelectorAll('.progress-fill').forEach(fill => {
              const score = fill.getAttribute('data-score');
              fill.style.width = score + '%';
            });
          }, 100);
        }
      } catch (err) {
        div.innerHTML = '<p style="color:#ef4444; text-align:center; font-size:13px; margin-top:15px;"><i class="fa-solid fa-triangle-exclamation"></i> Failed to connect to backend server.</p>';
      }
    }
  </script>

</body>
</html>
