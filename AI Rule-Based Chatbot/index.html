<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sage — your friendly AI guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #FBF7EF;
    --surface: #FFFFFF;
    --ink: #263826;
    --ink-soft: #66795F;
    --accent: #D9A441;
    --accent-ink: #6B4C10;
    --sage: #7FA684;
    --sage-soft: #E4F0E2;
    --gold-soft: #FBEEC9;
    --border: #E7E0CD;
    --radius-lg: 26px;
    --radius-md: 18px;
  }

  *{ box-sizing: border-box; }

  html, body{
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 8% 12%, rgba(127,166,132,0.16), transparent 40%),
      radial-gradient(circle at 92% 88%, rgba(217,164,65,0.14), transparent 42%);
    color: var(--ink);
    font-family: 'Inter', system-ui, sans-serif;
  }

  body{
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 28px 16px;
  }

  /* ---------- decorative organic shapes ---------- */
  .leaf{
    position: fixed;
    pointer-events: none;
    opacity: 0.55;
    z-index: 0;
  }
  .leaf--tl{ top: -40px; left: -50px; width: 220px; }
  .leaf--br{ bottom: -60px; right: -60px; width: 260px; transform: rotate(200deg); }
  @media (max-width: 640px){ .leaf{ display:none; } }

  /* ---------- chat shell ---------- */
  .shell{
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 640px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    box-shadow: 0 30px 60px -30px rgba(38,56,38,0.28);
    display: flex;
    flex-direction: column;
    height: min(760px, 88vh);
    overflow: hidden;
  }

  .shell__header{
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 22px 24px 18px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, var(--gold-soft), rgba(251,238,201,0));
  }

  .avatar{
    width: 46px;
    height: 46px;
    border-radius: 14px 14px 14px 4px;
    background: linear-gradient(145deg, var(--sage), var(--accent));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
    box-shadow: 0 6px 14px -6px rgba(107,76,16,0.45);
  }

  .header__text h1{
    font-family: 'Fraunces', serif;
    font-optical-sizing: auto;
    font-weight: 600;
    font-size: 21px;
    margin: 0 0 2px;
    letter-spacing: -0.01em;
  }

  .header__text p{
    margin: 0;
    font-size: 13px;
    color: var(--ink-soft);
  }

  .tag{
    margin-left: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.02em;
    color: var(--accent-ink);
    background: var(--gold-soft);
    border: 1px solid var(--border);
    padding: 5px 9px;
    border-radius: 999px;
    white-space: nowrap;
  }
  @media (max-width: 480px){ .tag{ display:none; } }

  /* ---------- messages ---------- */
  .messages{
    flex: 1;
    overflow-y: auto;
    padding: 22px 22px 8px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar{ width: 8px; }
  .messages::-webkit-scrollbar-thumb{ background: var(--border); border-radius: 8px; }

  .msg{
    max-width: 82%;
    padding: 12px 15px;
    font-size: 14.5px;
    line-height: 1.5;
    animation: rise 0.32s ease both;
  }

  @keyframes rise{
    from{ opacity: 0; transform: translateY(8px); }
    to{ opacity: 1; transform: translateY(0); }
  }

  .msg--bot{
    align-self: flex-start;
    background: var(--sage-soft);
    border-radius: 4px 16px 16px 16px;
    color: var(--ink);
  }

  .msg--user{
    align-self: flex-end;
    background: var(--ink);
    color: var(--bg);
    border-radius: 16px 4px 16px 16px;
  }

  .msg--bot::before{
    content: "Sage";
    display: block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--sage);
    margin-bottom: 3px;
    letter-spacing: 0.03em;
  }

  /* typing indicator, leaf-shaped */
  .typing{
    align-self: flex-start;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 10px 14px;
    background: var(--sage-soft);
    border-radius: 4px 16px 16px 16px;
  }
  .typing span{
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--sage);
    display: inline-block;
    animation: bounce 1.1s infinite ease-in-out;
  }
  .typing span:nth-child(2){ animation-delay: 0.15s; }
  .typing span:nth-child(3){ animation-delay: 0.3s; }
  @keyframes bounce{
    0%, 60%, 100%{ transform: translateY(0); opacity: 0.5; }
    30%{ transform: translateY(-4px); opacity: 1; }
  }

  /* ---------- suggestion chips ---------- */
  .chips{
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 4px 22px 16px;
  }
  .chip{
    font-family: 'Inter', sans-serif;
    font-size: 12.5px;
    font-weight: 500;
    color: var(--accent-ink);
    background: var(--gold-soft);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 7px 13px;
    cursor: pointer;
    transition: transform 0.15s ease, background 0.15s ease;
  }
  .chip:hover{ background: #F6DFA0; transform: translateY(-1px); }
  .chip:focus-visible{ outline: 2px solid var(--sage); outline-offset: 2px; }

  /* ---------- input row ---------- */
  .composer{
    display: flex;
    gap: 10px;
    padding: 14px 18px;
    border-top: 1px solid var(--border);
    background: var(--surface);
  }

  .composer input{
    flex: 1;
    border: 1px solid var(--border);
    background: var(--bg);
    border-radius: var(--radius-md);
    padding: 13px 16px;
    font-size: 14.5px;
    font-family: inherit;
    color: var(--ink);
  }
  .composer input:focus-visible{
    outline: 2px solid var(--sage);
    outline-offset: 1px;
  }
  .composer input::placeholder{ color: #A3A78F; }

  .composer button{
    border: none;
    background: var(--ink);
    color: var(--bg);
    font-weight: 600;
    font-size: 14px;
    padding: 0 20px;
    border-radius: var(--radius-md);
    cursor: pointer;
    transition: background 0.15s ease, transform 0.1s ease;
  }
  .composer button:hover{ background: #1B2A1B; }
  .composer button:active{ transform: scale(0.97); }
  .composer button:focus-visible{ outline: 2px solid var(--accent); outline-offset: 2px; }

  @media (prefers-reduced-motion: reduce){
    .msg, .typing span{ animation: none !important; }
  }
</style>
</head>
<body>

<svg class="leaf leaf--tl" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M10 10C80 0 190 40 180 130C170 210 60 190 20 130C-10 80 -20 25 10 10Z" fill="#7FA684" opacity="0.25"/>
</svg>
<svg class="leaf leaf--br" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M10 10C80 0 190 40 180 130C170 210 60 190 20 130C-10 80 -20 25 10 10Z" fill="#D9A441" opacity="0.22"/>
</svg>

<main class="shell">
  <header class="shell__header">
    <div class="avatar">🌱</div>
    <div class="header__text">
      <h1>Sage</h1>
      <p>Your warm, rule-based AI guide</p>
    </div>
    <span class="tag">rule-based · deterministic</span>
  </header>

  <div class="messages" id="messages" aria-live="polite"></div>

  <div class="chips" id="chips">
    <button class="chip" type="button">What is AI?</button>
    <button class="chip" type="button">Types of AI</button>
    <button class="chip" type="button">Applications of AI</button>
    <button class="chip" type="button">Say hello</button>
  </div>

  <form class="composer" id="composer">
    <input
      type="text"
      id="userInput"
      placeholder="Ask me anything about AI…"
      autocomplete="off"
      aria-label="Type your message"
    >
    <button type="submit">Send</button>
  </form>
</main>

<script>
  // ---------------------------------------------------------
  // KNOWLEDGE BASE — same rules as the Python chatbot.py
  // ---------------------------------------------------------
  const responses = {
    "hello": "Hi there! 😊 It's so nice to hear from you. How can I help you today?",
    "hi": "Hello! Welcome, I'm glad you're here. What would you like to know?",
    "hey": "Hey! Great to see you. Ask me anything about AI!",
    "good morning": "Good morning! I hope your day is off to a wonderful start. What can I help with?",
    "good evening": "Good evening! Hope you had a great day. How can I assist you?",

    "what is ai": "Artificial Intelligence (AI) is the field of computer science focused on building machines that can perform tasks which normally require human intelligence — like understanding language, recognizing patterns, and making decisions.",
    "define ai": "AI, or Artificial Intelligence, refers to the simulation of human intelligence in machines that are programmed to think, learn, and solve problems.",
    "what is artificial intelligence": "Artificial Intelligence is the science of teaching computers to think, reason, and make decisions in ways that mimic human intelligence.",
    "introduce ai": "Let me introduce you to AI! Artificial Intelligence is a branch of computer science dedicated to creating systems that can learn from data, adapt to new inputs, and perform human-like tasks such as recognizing speech, playing games, or even holding a conversation — just like this one!",
    "types of ai": "Great question! AI is generally grouped into three types: Narrow AI (built for a single task, like this chatbot), General AI (human-level intelligence across tasks, still theoretical), and Super AI (surpassing human intelligence, purely conceptual for now).",
    "applications of ai": "AI is everywhere! It powers voice assistants, recommendation systems on Netflix and Spotify, self-driving cars, medical diagnosis tools, fraud detection, and chatbots just like me. 🌟",
    "difference between ai and ml": "Good one! AI is the broad goal of making machines act intelligently. Machine Learning (ML) is a subset of AI where machines learn patterns from data instead of being explicitly programmed with rules.",
    "who invented ai": "The term 'Artificial Intelligence' was coined by John McCarthy in 1956, at the Dartmouth Conference — widely considered the birthplace of AI as a field.",
    "help": "I'd love to help! You can ask me things like 'what is AI', 'types of AI', 'applications of AI', or just say hello.",

    "thank you": "You're so welcome! Happy to help anytime. 😊",
    "thanks": "Anytime! Feel free to ask me more."
  };

  const FALLBACK = "Hmm, I don't have an answer for that just yet, but I'm always learning! Try asking about AI, its types, or its applications — or tap one of the suggestions below.";

  // ---------------------------------------------------------
  // SANITIZATION — same rule as clean_input() in Python
  // ---------------------------------------------------------
  function cleanInput(raw){
    return raw.toLowerCase().trim();
  }

  // ---------------------------------------------------------
  // UI wiring
  // ---------------------------------------------------------
  const messagesEl = document.getElementById('messages');
  const form = document.getElementById('composer');
  const input = document.getElementById('userInput');
  const chips = document.getElementById('chips');

  function addMessage(text, who){
    const div = document.createElement('div');
    div.className = 'msg msg--' + who;
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showTyping(){
    const t = document.createElement('div');
    t.className = 'typing';
    t.id = 'typingIndicator';
    t.innerHTML = '<span></span><span></span><span></span>';
    messagesEl.appendChild(t);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping(){
    const t = document.getElementById('typingIndicator');
    if (t) t.remove();
  }

  function botReply(userText){
    const key = cleanInput(userText);
    const reply = Object.prototype.hasOwnProperty.call(responses, key)
      ? responses[key]
      : FALLBACK;

    showTyping();
    const delay = 450 + Math.random() * 350;
    setTimeout(() => {
      removeTyping();
      addMessage(reply, 'bot');
    }, delay);
  }

  function sendMessage(text){
    const trimmed = text.trim();
    if (!trimmed) return;
    addMessage(trimmed, 'user');
    botReply(trimmed);
  }

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    sendMessage(input.value);
    input.value = '';
    input.focus();
  });

  chips.addEventListener('click', (e) => {
    if (e.target.matches('.chip')){
      sendMessage(e.target.textContent);
    }
  });

  // Greeting on load
  window.addEventListener('DOMContentLoaded', () => {
    showTyping();
    setTimeout(() => {
      removeTyping();
      addMessage("Hi, I'm Sage 🌱 — a rule-based guide built to answer your questions about AI. Ask me anything, or tap a suggestion below to get started.", 'bot');
    }, 500);
  });
</script>

</body>
</html>
